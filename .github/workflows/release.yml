name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── 1. Verify version consistency ────────────────────────────────────────────
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: Cargo.toml=${CARGO_VERSION} tag=v${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── 2. Create draft release (artifacts uploaded by build jobs) ───────────────
  create-release:
    name: Create draft release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this release
        id: notes
        run: |
          VERSION=${{ needs.verify.outputs.version }}
          # Extract the section between [0.x.y] and the next [0.x.y] header
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md \
            --prerelease=${{ contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Build and upload binaries ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [verify, create-release]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: oryx-bench
          target: ${{ matrix.target }}
          # Produces: oryx-bench-v0.1.0-x86_64-unknown-linux-musl.tar.gz
          archive: oryx-bench-$tag-${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Publish release (undraft after all binaries are uploaded) ─────────────
  publish-release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Publish to crates.io ──────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: build
    # Skip pre-release tags (v0.1.0-rc.1 etc.)
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ── 6. Deploy to AUR ─────────────────────────────────────────────────────────
  deploy-aur:
    name: Deploy to AUR
    needs: [verify, build]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD version
        run: |
          VERSION=${{ needs.verify.outputs.version }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@v3.1.1
        with:
          pkgname: oryx-bench-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: "GitHub Actions Bot"
          commit_email: "github-actions[bot]@users.noreply.github.com"
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "upgpkg: oryx-bench ${{ github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          updpkgsums: true
          force_push: true
