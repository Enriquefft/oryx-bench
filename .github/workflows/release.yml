name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── 1. Verify version consistency ────────────────────────────────────────────
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: Cargo.toml=${CARGO_VERSION} tag=v${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── 2. Preflight: tagged commit must compile, test, and have release notes ───
  #     Gates release creation so a broken tag cannot produce an orphan draft.
  preflight:
    name: Preflight (build + test + notes)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libudev (hidapi build dep)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets --locked

      - name: cargo test
        run: cargo test --workspace --locked

      - name: Verify CHANGELOG has non-empty section for this version
        run: |
          VERSION=${{ needs.verify.outputs.version }}
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          if ! grep -q '[^[:space:]]' release_notes.md; then
            echo "CHANGELOG.md has no entry (or empty entry) for [${VERSION}]" >&2
            exit 1
          fi

  # ── 3. Create draft release (artifacts uploaded by build jobs) ───────────────
  create-release:
    name: Create draft release
    needs: [verify, preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this release
        id: notes
        run: |
          VERSION=${{ needs.verify.outputs.version }}
          # Extract the section between [0.x.y] and the next [0.x.y] header
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md \
            --prerelease=${{ contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Build and upload binaries ─────────────────────────────────────────────
  #     Linux targets are gnu (not musl): hidapi's build script requires
  #     libudev, and static-linking libudev into a musl binary is not a
  #     supported configuration upstream. gnu linux + libudev matches how
  #     every distro ships hidapi-dependent tooling.
  build:
    name: Build ${{ matrix.target }}
    needs: [verify, create-release]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            linux: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            linux: true
          - target: x86_64-apple-darwin
            os: macos-latest
            linux: false
          - target: aarch64-apple-darwin
            os: macos-latest
            linux: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libudev (hidapi build dep, linux only)
        if: matrix.linux
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: oryx-bench
          target: ${{ matrix.target }}
          archive: oryx-bench-$tag-${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Publish release (undraft after all binaries are uploaded) ─────────────
  publish-release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 6. Publish to crates.io ──────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: build
    # Skip pre-release tags (v0.1.0-rc.1 etc.)
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CRATES_IO_TOKEN secret not set — skipping crates.io publish"
            exit 0
          fi
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── 7. Deploy to AUR ─────────────────────────────────────────────────────────
  deploy-aur:
    name: Deploy to AUR
    needs: [verify, build]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD version and checksums
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD

          X86_SHA=$(curl -fsSL \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/oryx-bench-v${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sha256sum | cut -d' ' -f1)
          AARCH_SHA=$(curl -fsSL \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/oryx-bench-v${VERSION}-aarch64-unknown-linux-musl.tar.gz" \
            | sha256sum | cut -d' ' -f1)

          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${X86_SHA}')/" packaging/aur/PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${AARCH_SHA}')/" packaging/aur/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/packaging/aur:/pkg" \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel >/dev/null 2>&1
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -c 'cd /pkg && makepkg --printsrcinfo'
            " > packaging/aur/.SRCINFO

      - name: Setup AUR SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push to AUR
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          git clone ssh://aur@aur.archlinux.org/oryx-bench-bin.git /tmp/aur-pkg \
            --config core.sshCommand="ssh -i ~/.ssh/aur_key"
          cp packaging/aur/PKGBUILD packaging/aur/.SRCINFO /tmp/aur-pkg/
          cd /tmp/aur-pkg
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.sshCommand "ssh -i ~/.ssh/aur_key"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet && echo "No changes to push" && exit 0
          git commit -m "upgpkg: oryx-bench-bin v${VERSION}"
          git push
